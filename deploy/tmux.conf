# Reference tmux settings for the d-brain brain session.
#
# ClaudeSession applies the critical one (history-limit) via set-option after
# new-session, so this file is informational / for `dbrain attach`. To use it
# globally: cp deploy/tmux.conf ~/.tmux.conf
#
# Larger scrollback so long replies stay capturable.
set -g history-limit 50000
# Don't keep dead panes around — the watchdog recreates the session cleanly.
set -g remain-on-exit off
